<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1d2d44">
  <title>Recuperar contraseña · perdimilibro</title>

  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Karla:wght@300..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="brand">
      <h1>perdimilibro</h1>
      <div class="tagline">tu biblioteca, ordenada de verdad</div>
    </div>

    <h2>Recuperar contraseña</h2>
    <p class="subtitle">Te mandamos un link al email para resetearla.</p>

    <div id="msg" class="auth-msg" style="display:none"></div>

    <form id="forgotForm" class="auth-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" inputmode="email">
      </div>
      <button type="submit" id="submitBtn">Enviar link de reset</button>
    </form>

    <div class="auth-foot">
      <a href="login.html">Volver a ingresar</a>
    </div>
  </div>

  <script type="module">
    import { requestPasswordReset } from './auth.js';

    const form    = document.getElementById('forgotForm');
    const btn     = document.getElementById('submitBtn');
    const msgBox  = document.getElementById('msg');

    function showMsg(text, kind = 'error') {
      msgBox.textContent = text;
      msgBox.className = `auth-msg ${kind}`;
      msgBox.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();

      btn.disabled = true;
      btn.textContent = 'Enviando…';
      msgBox.style.display = 'none';

      try {
        await requestPasswordReset(email);
        showMsg(`Te mandamos un link a ${email}. Revisá tu inbox (y spam).`, 'success');
        btn.textContent = 'Enviado';
      } catch (err) {
        showMsg(err.message);
        btn.disabled = false;
        btn.textContent = 'Enviar link de reset';
      }
    });
  </script>
</body>
</html>
