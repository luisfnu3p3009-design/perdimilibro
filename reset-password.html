<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1d2d44">
  <title>Nueva contraseña · perdimilibro</title>

  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Karla:wght@300..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="brand">
      <h1>perdimilibro</h1>
      <div class="tagline">tu biblioteca, ordenada de verdad</div>
    </div>

    <h2>Nueva contraseña</h2>
    <p class="subtitle">Elegí tu contraseña nueva. Mínimo 6 caracteres.</p>

    <div id="msg" class="auth-msg" style="display:none"></div>

    <form id="resetForm" class="auth-form">
      <div class="field">
        <label for="password">Contraseña nueva</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6">
      </div>
      <div class="field">
        <label for="password2">Repetir contraseña</label>
        <input type="password" id="password2" name="password2" required autocomplete="new-password" minlength="6">
      </div>
      <button type="submit" id="submitBtn">Guardar contraseña</button>
    </form>

    <div class="auth-foot">
      <a href="login.html">Volver a ingresar</a>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js';
    import { updatePassword } from './auth.js';

    const form    = document.getElementById('resetForm');
    const btn     = document.getElementById('submitBtn');
    const msgBox  = document.getElementById('msg');

    function showMsg(text, kind = 'error') {
      msgBox.textContent = text;
      msgBox.className = `auth-msg ${kind}`;
      msgBox.style.display = 'block';
    }

    // Cuando el user viene del link de email, Supabase tira un evento PASSWORD_RECOVERY
    // que crea una sesión temporal. Esperamos a confirmar que tenemos sesión.
    let recoverySessionReady = false;
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
        recoverySessionReady = true;
      }
    });

    // Fallback: si ya hay sesión activa al cargar (porque detectSessionInUrl ya procesó)
    supabase.auth.getSession().then(({ data }) => {
      if (data?.session) recoverySessionReady = true;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw1 = document.getElementById('password').value;
      const pw2 = document.getElementById('password2').value;

      if (pw1 !== pw2) { showMsg('Las contraseñas no coinciden.'); return; }
      if (!recoverySessionReady) {
        showMsg('El link de reset expiró o ya se usó. Pedí uno nuevo.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Guardando…';
      msgBox.style.display = 'none';

      try {
        await updatePassword(pw1);
        showMsg('Contraseña actualizada. Redirigiendo…', 'success');
        setTimeout(() => window.location.replace('/'), 1200);
      } catch (err) {
        showMsg(err.message);
        btn.disabled = false;
        btn.textContent = 'Guardar contraseña';
      }
    });
  </script>
</body>
</html>
